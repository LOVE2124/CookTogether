<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CookTogether</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span>🍳</span> CookTogether</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="recipes.html">Recipes</a>
      <a href="submit.html">Submit Recipe</a>
      <a href="login.html" class="btn-nav">Login</a>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a>
    <a href="recipes.html">Recipes</a>
    <a href="submit.html">Submit Recipe</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:2.5rem;margin-bottom:8px;">🌿</div>
      <h2>Join CookTogether</h2>
      <p class="subtitle">Create your free account and start sharing recipes</p>
    </div>

    <form onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="Shubham" required />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Doe" required />
        </div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="@shubhamcooks" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="At least 8 characters" required minlength="8" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Repeat your password" required />
      </div>
      <div style="margin-bottom:20px;font-size:0.83rem;color:var(--text-muted);">
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-weight:400;line-height:1.5;">
          <input type="checkbox" style="margin-top:3px;" required />
          I agree to the <a href="about.html" style="color:var(--primary);">Community Guidelines</a> and Terms of Service
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;">🚀 Create Account</button>
    </form>

    <div class="divider">or sign up with</div>

    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline w-full" style="justify-content:center;font-size:0.88rem;">🌐 Google</button>
      <button class="btn btn-outline w-full" style="justify-content:center;font-size:0.88rem;">🍎 Apple</button>
    </div>

    <div class="form-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
  function handleRegister(e) {
    e.preventDefault();
    window.location.href = 'profile.html';
  }
</script>
</body>
</html>
