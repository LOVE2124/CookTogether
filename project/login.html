<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CookTogether</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span>🍳</span> CookTogether</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="recipes.html">Recipes</a>
      <a href="submit.html">Submit Recipe</a>
      <a href="login.html" class="btn-nav active">Login</a>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a>
    <a href="recipes.html">Recipes</a>
    <a href="submit.html">Submit Recipe</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:2.5rem;margin-bottom:8px;">🍳</div>
      <h2>Welcome back!</h2>
      <p class="subtitle">Sign in to your CookTogether account</p>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required />
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:0.85rem;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:400;">
          <input type="checkbox" /> Remember me
        </label>
        <a href="#" style="color:var(--primary);font-weight:600;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;">Sign In</button>
    </form>

    <div class="divider">or continue with</div>

    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline w-full" style="justify-content:center;font-size:0.88rem;">🌐 Google</button>
      <button class="btn btn-outline w-full" style="justify-content:center;font-size:0.88rem;">🍎 Apple</button>
    </div>

    <div class="form-footer">
      Don't have an account? <a href="register.html">Create one free</a>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
  function handleLogin(e) {
    e.preventDefault();
    window.location.href = 'profile.html';
  }
</script>
</body>
</html>
